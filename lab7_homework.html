<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Lab 7 Assignment</title>
    <!-- set styling properties for the map, title, and timeSlider-->
    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
      #titleDiv {
              padding: 20px;
              font-size: 20;
              text-align: center;
      }
      #timeSlider {
        position: absolute;
        left: 5%;
        right: 5%;
        bottom: 20px;
        margin-bottom: 10px;
      }
    </style>
    <!-- Links to ESRI stylesheets and scripts -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.21/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/4.21/"></script>
    <script>
      //Add necessary modules for our map
      require(["esri/views/MapView",
      "esri/Map", "esri/layers/TileLayer",
      "esri/layers/MapImageLayer",
      "esri/layers/FeatureLayer",
      "esri/widgets/TimeSlider"],
      (MapView, Map, TileLayer, MapImageLayer, FeatureLayer, TimeSlider) => {
    //MAP IMAGE LAYER ------------------------------
        //Create styling for the fish essential habitat layer
        var fishHabRenderer = {
           type: "simple",
           symbol: {
             type: "simple-fill",
             color: [95, 185, 221, 0.4],
             outline: {
              color: [80, 154, 183],
              width: 1}
           }
         }
      //Bring in the fish habitat as a map image layer. Select SubLayer 6 for Reef Fish specifically.
      var fishHab = new MapImageLayer({
        url: "https://gis.ngdc.noaa.gov/arcgis/rest/services/GulfDataAtlas/EssentialFishHabitats/MapServer",
        sublayers: [
          {
           id: 6,
           renderer: fishHabRenderer
          }
        ]
      });
    //FEATURE LAYER -------------------------------------
      //Create rendering properties for the wells layer
      var wellsRender = {
        type: "simple",
        symbol: {
          type: "simple-marker",
          size: 4,
          color: "#ff9200",
          outline: {
            color: "#ff0000"
          }
        }
      }
      //Call in the feature layer from arcgis server, including additional rendering effects
      var wells = new FeatureLayer({
          url: "https://services.arcgis.com/bDAhvQYMG4WL8O5o/ArcGIS/rest/services/Wells_History/FeatureServer",
          renderer: wellsRender,
          effect: "bloom(0.8, 0.4px, 0%)  blur(2.7px)",
        });

    //BASEMAP & MAPVIEW --------------------------------------
      //Set up new map with dark grey basemap and add the two layers
      var map = new Map({
          basemap: "dark-gray",
          layers: [fishHab, wells]
          });

      //Set the map view to zoom level 7, centered on the Gulf of Mexico
      var view = new MapView({
          container: "viewDiv",
          map: map,
          zoom: 7,
          center: [-90.681871, 27.777734]
    });

    //TIMESLIDER WIDGET -----------------------------------------
    //Create timeslider object & add UI to map
    const timeSlider = new TimeSlider({
      container: "timeSlider",
      mode: "cumulative-from-start",
      view: view,
      loop: true,
      playRate: 30
      });
    view.ui.add(timeSlider, "manual");

    //Set event to get time from feature layer based on timeslider position
    view.whenLayerView(wells).then((lv) => {
          timeSlider.fullTimeExtent =
            wells.timeInfo.fullTimeExtent;
          timeSlider.stops = {
            interval:{
              value: 1,
              unit: "years"
            }
          };
        });
    //Add title to the map
    view.ui.add("titleDiv", "top-right");

  //QUERYING FEATURE
  //Set up querying options based on OperatorName field in the wells table
  const wellLayerSQL = [
    "Choose a SQL where clause...", "OperatorName = Andarko Petroleum Corporation",
    "OperatorName = Shell Offshore Inc.", "OperatorName = Exxon Mobil Corporation",
    "OperatorName = Chevron USA Inc.", "OperatorName = EOG Resources Inc.",
    "OperatorName = Prime Offshore LLC", "OperatorName = Union Oil Company of California"];
  let whereClause = wellLayerSQL[0];

  // Add SQL UI -- creates the box where users can select querying options
  const select = document.createElement("select","");
    select.setAttribute("class", "esri-widget esri-select");
    select.setAttribute("style", "width: 200px; font-family: 'Avenir Next'; font-size: 1em");
    wellLayerSQL.forEach(function(query){
  let option = document.createElement("option");
    option.innerHTML = query;
    option.value = query;
    select.appendChild(option);
  });
  view.ui.add(select, "top-right");

  // Listen for changes in selection
  select.addEventListener('change', (event) => {
    whereClause = event.target.value;
    queryFeatureLayer(view.extent);
  });
  //function for querying
  function queryFeatureLayer(extent) {
    const wellQuery = {
    where: whereClause,  // Set by select element
    spatialRelationship: "intersects", // Relationship operation to apply
    geometry: extent, // Restricted to visible extent of the map
    outFields: ["OperatorName"], // Attributes to return
    returnGeometry: true
    };
  wells.queryFeatures(wellQuery)
    .then((results) => {
        console.log("Feature count: " + results.features.length)
        displayResults(results);
    }).catch((error) => {
        console.log(error.error);
    });
  }
  //Displaying Results of querying
    function displayResults(results) {
    const symbol = {
      type: "simple-marker",
      color: [ 20, 130, 200, 0.5 ],
      outline: {
        color: "white",
        width: .5
      },
    }};

});
  </script>
  </head>

  <body>
    <!-- Create div element for our map -->
    <div id="viewDiv"></div>
    <!--Create div element for timeslider-->
    <div id="timeSlider"></div>
    <!--Create div element for title-->
    <div id="titleDiv" class="esri-widget">
      <div id="titleText">Oil Wells Built in Essential Reef Fish Habitat (1995-2017)</div>
    </div>
  </body>

</html>
