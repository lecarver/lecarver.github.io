<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Lab 7 Assignment</title>
    <!-- Make map frame fill our whole screen -->
    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>
    <!-- Links to ESRI stylesheets and scripts -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.21/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/4.21/"></script>

    <script>
      //Add necessary modules for our map
      require(["esri/views/MapView",
      "esri/Map", "esri/layers/TileLayer",
      "esri/layers/MapImageLayer",
      "esri/layers/FeatureLayer",
      "esri/widgets/TimeSlider",
      "esri/TimeExtent"],
      (MapView, Map, TileLayer, MapImageLayer, FeatureLayer, TimeSlider, TimeExtent) => {
    //MAP IMAGE LAYER ------------------------------
        //Create styling for the police stations
        var StationRenderer = {
        type: "simple", // autocasts as new SimpleRenderer()
        //Indicates that we will have a yellow 3px point for our cities
        symbol: {
            type: "simple-marker", // autocasts as new SimpleMarkerSymbol()
            size: 4,
            color: "blue",
            style: "diamond",
            label: "Police Stations"
          }};
      //Bring in the police stations as a map image layer
        var StationsLayer = new MapImageLayer({
        url: "https://carto.nationalmap.gov/arcgis/rest/services/structures/MapServer",
        sublayers: [
          {
           id: 53,
           renderer: StationRenderer
          }
        ]
      });
    //FEATURE LAYER -------------------------------------
      //set up empty layerView variable for use in TimeSlider later on
      let layerView;
      //Create rendering properties for the feature layer
      var ShootingRender = {
        type: "simple",
        symbol: {
          type: "simple-marker",
          size: 4,
          color: "#ff9200",
          outline: {
            color: "#ff0000"
          }
        }

      }
      //Call in the feature layer from arcgis server, including time properties & additional rendering effects
      var ShootingLayer = new FeatureLayer({
          url: "https://services.arcgis.com/V6ZHFr6zdgNZuVG0/ArcGIS/rest/services/NYPD_Shooting_Incident_Data__Historic_/FeatureServer",
          timeExtent: {
            start: new Date(2005, 11, 30 ),
            end: new Date(2020, 11, 30)
          },
          timeInfo: {
            startField: "OCCUR_DATE",
            interval: {
              unit: "days",
              value: 1
            }
          },
          renderer: ShootingRender,
          effect: "bloom(0.8, 0.4px, 0%)  blur(2.7px)"
        });

    //BASEMAP & MAPVIEW --------------------------------------
      //Set up new map with dark grey basemap and add our two layers
      var map = new Map({
          basemap: "dark-gray",
          layers: [ShootingLayer, StationsLayer]
          });

      //Set the map view to zoom level 10, centered on New York
        var view = new MapView({
          container: "viewDiv",
          map: map,
          zoom: 10,
          center: [-74.0060, 40.7128],
          // timeExtent: {
          //   start: new Date(2005, 11, 30 ),
          //   end: new Date(2020, 11, 30)
          // }
    });
    //TIMESLIDR WIDGET -----------------------------------------
      //create timeslider object, setting the interval to match time extent of feature layer
        var timeSlider = new TimeSlider({
          container: "timeSlider",
          playRate: 50,
          stops: {
            interval: {
              value: 1,
              unit: "days"
            }
          },
          fullTimeExtent: {
            start: new Date(2005, 11, 30 ),
            end: new Date(2020, 11, 30)
          },
          timeVisible: true, // show the time stamps on the timeslider
          mode: "instant",
          });
        view.ui.add(timeSlider, "manual");

        // view.whenLayerView(ShootingLayer).then((lv) => {
        //   layerView = lv;
        //   const start = new Date(2005, 11, 30);
        //   timeSlider.fullTimeExtent = {
        //       start: start,
        //       end: ShootingLayer.timeInfo.fullTimeExtent.end
        //     };
        //   let end = new Date(start);
        //   end.setDate(end.getDate() + 1);
        //   timeSlider.timeExtent = {start, end};
        // });
        //
        // timeSlider.watch("timeExtent", () => {
        //   ShootingLayer.definitionExpression =
        //     "OCCUR_DATE <= " + timeSlider.timeExtent.end.getTime();
        //   });

});

  </script>
  </head>

  <body>
    <!-- Create div element for our map -->
    <div id="viewDiv"></div>
    <!--Create div element for timeslider-->
    <div id="timeSlider"></div>
    <div id="titleDiv" class="esri-widget">
      <div id="titleText">Police Shootings in NYC</div>
    </div>
  </body>

</html>
