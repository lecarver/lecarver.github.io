<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Lab 7 Assignment</title>
    <!-- Make map frame fill our whole screen -->
    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>
    <!-- Links to ESRI stylesheets and scripts -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.21/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/4.21/"></script>

    <script>
      //Add necessary modules for our map
      require(["esri/views/MapView",
      "esri/Map", "esri/layers/TileLayer",
      "esri/layers/MapImageLayer",
      "esri/layers/FeatureLayer",
      "esri/widgets/TimeSlider",
      "esri/symbols/SimpleFillSymbol"],
      (MapView, Map, TileLayer, MapImageLayer, FeatureLayer, TimeSlider, SimpleFillSymbol) => {
    //MAP IMAGE LAYER ------------------------------
        //Create styling for the fish essential habitat layer
        var fishHabRenderer = {
           type: "simple",
           symbol: {
             type: "simple-fill",
             color: [95, 185, 221, 0.4],  // Orange, opacity 40%
             outline: {
              color: [80, 154, 183],
              width: 1}
           }
         }
      //Bring in the fish habitat as a map image layer
        var fishHab = new MapImageLayer({
        url: "https://gis.ngdc.noaa.gov/arcgis/rest/services/GulfDataAtlas/EssentialFishHabitats/MapServer",
        sublayers: [
          {
           id: 6,
           renderer: fishHabRenderer
          }
        ]
      });
    //FEATURE LAYER -------------------------------------
      //Create rendering properties for the feature layer
      var wellsRender = {
        type: "simple",
        symbol: {
          type: "simple-marker",
          size: 4,
          color: "#ff9200",
          outline: {
            color: "#ff0000"
          }
        }
      }
      //Call in the feature layer from arcgis server, including time properties & additional rendering effects
      var wells = new FeatureLayer({
          url: "https://services.arcgis.com/bDAhvQYMG4WL8O5o/ArcGIS/rest/services/Wells_History/FeatureServer/0",
          renderer: wellsRender,
          effect: "bloom(0.8, 0.4px, 0%)  blur(2.7px)"
        });

    //BASEMAP & MAPVIEW --------------------------------------
      //Set up new map with dark grey basemap and add our two layers
      var map = new Map({
          basemap: "dark-gray",
          layers: [fishHab, wells]
          });

      //Set the map view to zoom level 10, centered on New York
        var view = new MapView({
          container: "viewDiv",
          map: map,
          zoom: 7,
          center: [-90.681871, 27.777734],
          // timeExtent: {
          //   start: new Date(2005, 11, 30 ),
          //   end: new Date(2020, 11, 30)
          // }
    });
    //TIMESLIDR WIDGET -----------------------------------------

});

  </script>
  </head>

  <body>
    <!-- Create div element for our map -->
    <div id="viewDiv"></div>
    <!--Create div element for timeslider-->
    <div id="timeSlider"></div>
    <div id="titleDiv" class="esri-widget">
      <div id="titleText">Police Shootings in NYC</div>
    </div>
  </body>

</html>
