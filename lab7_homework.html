<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Simple Map</title>
    <!-- Make map frame fill our whole screen -->
    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>
    <!-- Links to ESRI stylesheets and scripts -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.21/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/4.21/"></script>

    <script>
      //Add necessary modules for our map
      require(["esri/views/MapView", "esri/Map"], (MapView, Map) => {
      //Create new map with streets basemap
        var map = new Map({ basemap: "streets"
    });
      //Set the map view to zoom level 10, centered on Los Angelos
        var view = new MapView({
          container: "viewDiv",
          map: map,
          zoom: 10,
          center: [-118.2095, 34.0866]
    });
    });
    </script>
  </head>

  <body>
    <!-- Create div element for our map -->
    <div id="viewDiv"></div>
  </body>
</html>
