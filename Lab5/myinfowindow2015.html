<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <title>Info windows</title>
    <style>
      html, body, #map-canvas {
        height: 100%;
        margin: 0px;
        padding: 0px;
      }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?v=3.exp&signed_in=true"></script>
    <script>
// This example displays a marker at the center of Australia.
// When the user clicks the marker, an info window opens.

function initialize() {
  //Set the lat/long coordinates for our map. I have selected the coordinates
  //for Plano Senior HS in Plano, TX.
    var myLatlng = new google.maps.LatLng(33.02897195128468, -96.75187621588002);
    var mapOptions = {
      zoom: 16, //Increased the Zoom a bit more
      center: myLatlng
    };

  var map = new google.maps.Map(document.getElementById('map-canvas'), mapOptions);
//Creating some information about the location to add to the info Window
  var contentString =
        '<h1> Plano Senior High School </h1>' +
        '<h3> Plano, TX </h3>' +
        '<div id = "content">' +
            'This is Plano Senior High School where Lester went to school! ' +
          'It only has grades 11 & 12 and has a graduating class size of around 1300 students.' +
          '<br><br>' +
          'According to its wikipedia page, PSHS was founded in 1891.' +
          'The school apparently delivers more AP tests every year than any other' +
          'school west of the Mississppi River and all but one school in the US. ' +
          'Pretty cool!'
          '</div>';
//Create the info window and add the content from above to it.
  var infowindow = new google.maps.InfoWindow(
  {
      content: contentString
  }
  );

//Give the location a marker a title
  var marker = new google.maps.Marker({
      position: myLatlng,
      map: map,
      title: 'Plano Senior High School'
  });

//Info window will open when the marker is clicked on.
  google.maps.event.addListener(marker, 'click', function() {
    infowindow.open(map,marker);
  });
}

//initialize the map when the DOM is loaded
google.maps.event.addDomListener(window, 'load', initialize);

    </script>
  </head>
  <body>
    <div id="map-canvas"></div>
  </body>
</html>
